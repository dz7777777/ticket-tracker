// Find a file inside the ZIP by name, return its decompressed bytes
function findZipEntry(name) {
  var sig = [0x50,0x4B,0x03,0x04]; // Local file header signature
  var nameBytes = [];
  for(var i=0;i<name.length;i++) nameBytes.push(name.charCodeAt(i));
  
  for(var i=0;i<bytes.length-4;i++) {
    if(bytes[i]===sig[0]&&bytes[i+1]===sig[1]&&bytes[i+2]===sig[2]&&bytes[i+3]===sig[3]) {
      var compression = bytes[i+8]|(bytes[i+9]<<8);
      var compSize = bytes[i+18]|(bytes[i+19]<<8)|(bytes[i+20]<<16)|(bytes[i+21]<<24);
      var uncompSize = bytes[i+22]|(bytes[i+23]<<8)|(bytes[i+24]<<16)|(bytes[i+25]<<24);
      var nameLen = bytes[i+26]|(bytes[i+27]<<8);
      var extraLen = bytes[i+28]|(bytes[i+29]<<8);
      var dataStart = i+30+nameLen+extraLen;
      
      // Check if this entry matches our target name
      var entryName = "";
      for(var j=0;j<nameLen;j++) entryName += String.fromCharCode(bytes[i+30+j]);
      
      if(entryName === name) {
        var data = bytes.slice(dataStart, dataStart+compSize);
        if(compression === 0) {
          // Stored (no compression)
          return data;
        } else if(compression === 8) {
          // Deflate - use DecompressionStream if available
          return {compressed: data, uncompSize: uncompSize};
        }
      }
    }
  }
  return null;
}

function bytesToStr(bytes) {
  var s = "";
  for(var i=0;i<bytes.length;i++) s += String.fromCharCode(bytes[i]);
  return s;
}

// Try to decompress using DecompressionStream (modern browsers)
function decompress(data, callback) {
  try {
    var ds = new DecompressionStream("deflate-raw");
    var writer = ds.writable.getWriter();
    var reader = ds.readable.getReader();
    var chunks = [];
    reader.read().then(function pump(result) {
      if(result.done) {
        var total = chunks.reduce(function(a,b){return a+b.length;},0);
        var out = new Uint8Array(total);
        var offset=0;
        chunks.forEach(function(c){out.set(c,offset);offset+=c.length;});
        callback(out);
      } else {
        chunks.push(result.value);
        reader.read().then(pump);
      }
    });
    writer.write(data.compressed);
    writer.close();
  } catch(e) {
    callback(null);
  }
}

function parseAfterDecompress(ssData, wsData) {
  var ssStr = bytesToStr(ssData);
  var wsStr = bytesToStr(wsData);
  
  // Parse shared strings
  var shared = [];
  var ssMatches = ssStr.match(/<si>[\s\S]*?<\/si>/g) || [];
  ssMatches.forEach(function(si) {
    var texts = si.match(/<t[^>]*>([^<]*)<\/t>/g) || [];
    shared.push(texts.map(function(t){return t.replace(/<[^>]+>/g,"");}).join(""));
  });
  
  // Parse worksheet rows
  var colMap = ["A","B","C","D","E","F","G","H","I","J","K","L"];
  var rowMatches = wsStr.match(/<row[^>]*>[\s\S]*?<\/row>/g) || [];
  var headers = [];
  var dataRows = [];
  
  rowMatches.forEach(function(rowXml, ri) {
    var cells = {};
    var cellMatches = rowXml.match(/<c[^>]*>[\s\S]*?<\/c>/g) || [];
    cellMatches.forEach(function(cellXml) {
      var refMatch = cellXml.match(/r="([A-Z]+)\d+"/);
      var typeMatch = cellXml.match(/t="([^"]+)"/);
      var styleMatch = cellXml.match(/s="([^"]+)"/);
      var valMatch = cellXml.match(/<v>([^<]*)<\/v>/);
      if(!refMatch || !valMatch) return;
      var col = refMatch[1];
      var t = typeMatch ? typeMatch[1] : "";
      var s = styleMatch ? styleMatch[1] : "";
      var v = valMatch[1];
      if(t === "s") {
        cells[col] = shared[parseInt(v)] || "";
      } else if(dateStyleSet[parseInt(s)]) {
        // Date serial - use UTC to avoid timezone issues
        var serial = parseInt(v);
        var d = new Date(Date.UTC(1899,11,30) + serial*86400000);
        cells[col] = (d.getUTCMonth()+1)+"/"+(d.getUTCDate())+"/"+d.getUTCFullYear();
      } else {
        cells[col] = v;
      }
    });
    if(ri === 0) {
      headers = colMap.map(function(c){return cells[c]||"";});
    } else if(Object.keys(cells).length > 0) {
      var r = newRow();
      headers.forEach(function(h,idx) {
        var col = resolveCol(h);
        var val = cells[colMap[idx]]||"";
        if(col && val !== "") r[col] = val;
      });
      dataRows.push(calc(r));
    }
  });
  
  if(dataRows.length) {
    rows = dataRows; sortR(); mkDirty();
    importSuccess = dataRows.length + " records imported from Excel";
    renderAll();
  } else {
    alert("No data found in Excel file.");
  }
}

function xDate(s){
if(!s)return null;s=s.trim();var m;
m=s.match(/\b(\d{1,2})/(\d{1,2})/(\d{2,4})\b/);if(m)return parseInt(m[1])+”/”+parseInt(m[2])+”/”+(m[3].length===2?“20”+m[3]:m[3]);
m=s.match(/^(\d{1,2})/(\d{1,2})$/);if(m)return parseInt(m[1])+”/”+parseInt(m[2])+”/”+CY;
m=s.match(/\b(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)[a-z]*.?\s+(\d{1,2}),?\s+(\d{4})\b/i);if(m){var mo=MM[m[1].toLowerCase()];if(mo)return mo+”/”+parseInt(m[2])+”/”+m[3];}
m=s.match(/\b(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)[a-z]*.?\s+(\d{1,2})\b/i);if(m){var mo=MM[m[1].toLowerCase()];if(mo)return mo+”/”+parseInt(m[2])+”/”+CY;}
m=s.match(/\b(\d{1,2})\s+(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)[a-z]*\s+(\d{4})\b/i);if(m){var mo=MM[m[2].toLowerCase()];if(mo)return mo+”/”+parseInt(m[1])+”/”+m[3];}
return null;
}
